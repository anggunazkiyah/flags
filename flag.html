<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesia Flag</title>
    <style>
        /* the css start here #ce1126 */
        body {
            background-color: black;
        }

        .flag {
            background-color: #ce1126;
            width: 900px;
            height: 600px;
            position: fixed;
        }

        div > div > p {
            background-color: #fff;
            width: 900px;
            height: 300px;
            position: relative;
            top: 200px;
        }

        * p {
            font-size: 2rem;
            text-align: center;
        }

    </style>
</head>

<body>
    <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Indonesia</p>
      </div>
    </div>
  </div>
</body>

</html>
